services:
  db:
    image: postgres:16-alpine
    container_name: logistix_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: odoo:18.0
    container_name: logistix_web
    restart: unless-stopped
    init: true
    tty: true
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    env_file:
      - .env
    environment:
      - HOST=db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    command: -d ${POSTGRES_DB} --admin-passwd=${ODOO_ADMIN_PASSWORD}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./configs/production/odoo.conf:/etc/odoo/odoo.conf
    networks:
      - logistix_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8069/web/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  odoo_data:

networks:
  logistix_net:
    driver: bridge
